        - paragraph [ref=e90]: Esperar o equipamento quebrar parece economia, mas quase sempre é a opção mais cara. Entenda a diferença entre manutenção preventiva e corretiva e como escolher a estratégia certa para climatização e refrigeração.
        - img "Técnicos da Dancold realizando manutenção em equipamento de refrigeração" [ref=e92]
        - generic [ref=e93]:
          - paragraph [ref=e94]: "Toda empresa que depende de climatização ou refrigeração enfrenta a mesma decisão, mesmo sem perceber: consertar quando quebra ou manter antes de quebrar. A escolha parece detalhe operacional, mas define diretamente quanto você gasta, quanto tempo sua operação fica parada e por quantos anos seus equipamentos vão durar."
          - heading "O que é manutenção corretiva" [level=2] [ref=e95]:
            - generic [ref=e97]: O que é manutenção corretiva
          - paragraph [ref=e98]: Manutenção corretiva é a que acontece depois da falha. O compressor para, a câmara fria esquenta, o ambiente perde o conforto — e só então a equipe é acionada. É o modelo “se não está quebrado, não mexe”.
          - paragraph [ref=e99]: "O problema é que a falha nunca escolhe uma hora conveniente. Ela costuma acontecer no pico de calor, no fim de semana ou no meio de um lote de produção. E o custo não é só o do conserto: é o da produção parada, do produto perdido, do cliente insatisfeito e, muitas vezes, do equipamento que precisa ser trocado inteiro porque a quebra foi grave demais."
          - heading "O que é manutenção preventiva" [level=2] [ref=e100]:
            - generic [ref=e102]: O que é manutenção preventiva
          - paragraph [ref=e103]: Manutenção preventiva é a que acontece antes da falha, em intervalos planejados. Limpeza de trocadores, verificação de pressões, análise de consumo, troca de filtros, aperto de conexões elétricas — tudo dentro de um cronograma, com o equipamento ainda funcionando.
          - paragraph [ref=e104]: "O objetivo é simples: encontrar o pequeno problema antes que ele vire o grande problema. Um filtro sujo detectado a tempo custa alguns reais; o mesmo filtro ignorado sobrecarrega o compressor e pode custar dezenas de milhares."
          - heading "A conta que a maioria não faz" [level=2] [ref=e105]:
            - generic [ref=e107]: A conta que a maioria não faz
          - paragraph [ref=e108]: "Na comparação direta, a manutenção preventiva sempre parece “gasto a mais” — afinal, você paga mesmo quando está tudo funcionando. Mas a conta certa não é essa. A conta certa inclui:"
          - list [ref=e109]:
            - listitem [ref=e110]: O custo de uma parada não planejada (produção, vendas, atendimento).
            - listitem [ref=e111]: A perda de produtos perecíveis, vacinas ou matéria-prima refrigerada.
            - listitem [ref=e112]: O consumo extra de energia de um sistema operando fora do ponto ideal.
            - listitem [ref=e113]: A redução da vida útil do equipamento por operar sob estresse.
          - paragraph [ref=e114]: Quando esses valores entram na conta, a preventiva quase sempre custa uma fração da corretiva. Não é opinião — é a diferença entre gastar pouco de forma previsível ou gastar muito de forma imprevisível.
          - heading "Quando a corretiva ainda faz sentido" [level=2] [ref=e115]:
            - generic [ref=e117]: Quando a corretiva ainda faz sentido
          - paragraph [ref=e118]: "Ser honesto ajuda: nem todo equipamento justifica um plano robusto. Um split isolado, de baixo uso e fácil reposição, pode conviver bem com a manutenção corretiva. O cálculo muda quando o equipamento é crítico — ou seja, quando a falha dele para a operação, estraga produto ou coloca pessoas em risco. Aí, prevenir deixa de ser opção e vira necessidade."
          - heading "Como a Dancold estrutura a manutenção" [level=2] [ref=e119]:
            - generic [ref=e121]: Como a Dancold estrutura a manutenção
          - paragraph [ref=e122]: "Na Dancold, a manutenção preventiva não é uma visita solta de vez em quando: é um plano vivo. Trabalhamos com contratos que incluem cronograma de rotinas, equipes fixas ou volantes, relatórios técnicos periódicos e monitoramento contínuo de temperatura e energia com alarme 24/7 para os ambientes mais críticos."
          - paragraph [ref=e123]: Assim, o cliente troca o susto da quebra pela previsibilidade do controle — com um único contrato, documentação em dia e o equipamento durando o que deveria durar.
          - paragraph [ref=e124]: Se a sua operação depende de climatização ou refrigeração para funcionar, vale conversar. Nossa equipe técnica avalia o seu cenário e monta o plano que faz sentido para o seu caso.
