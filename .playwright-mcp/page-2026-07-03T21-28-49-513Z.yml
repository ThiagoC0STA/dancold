        - paragraph [ref=e97]: A Dancold
        - heading "Nossa história" [level=2] [ref=e99]
        - paragraph [ref=e100]: Fundada em 1998 como empresa familiar especializada em manutenção de ar-condicionado e refrigeração, a Dancold expandiu sua atuação para o setor industrial a partir de 2002, atendendo desde então marcas reconhecidas nacional e internacionalmente. Hoje, com mais de 25 anos de mercado, somos uma referência em HVAC, refrigeração industrial e automação de processos no Sul do Brasil.
