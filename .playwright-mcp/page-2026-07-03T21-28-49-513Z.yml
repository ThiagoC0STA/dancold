            - paragraph [ref=e120]: 2014 - 2021
            - paragraph [ref=e121]: Por conta do alto volume de demanda, começou a atuar nas áreas de consultoria, comissionamento, gerenciamento e supervisão de obras, terceirizando serviços de empreitada.
        - listitem [ref=e122]:
          - generic [ref=e124]:
            - paragraph [ref=e125]: "2022"
