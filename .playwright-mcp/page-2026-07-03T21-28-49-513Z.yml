            - paragraph [ref=e131]: Expande atividades para mais 3 estados, hoje presente em 11 cidades distribuídas no Paraná, São Paulo, Rio de Janeiro e Santa Catarina. Fortalecendo cada vez mais os serviços como uma grande mantenedora garantindo aos seus clientes maior produtividade através do controle, coordenação e fiscalização integrados de seus processos.
