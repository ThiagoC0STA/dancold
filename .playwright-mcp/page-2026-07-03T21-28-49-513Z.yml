            - paragraph [ref=e106]: Iniciou sua trajetória como uma empresa familiar, prestando serviços de manutenção em sistemas de ar-condicionado e refrigeração nas áreas residencial e comercial.
        - listitem [ref=e107]:
          - generic [ref=e109]:
            - paragraph [ref=e110]: 2004 - 2008
            - paragraph [ref=e111]: Estende sua área de atuação para indústrias, passando a oferecer assistência para várias marcas renomadas no mercado internacional.
        - listitem [ref=e112]:
