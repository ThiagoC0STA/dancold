                - paragraph [ref=e76]: O PMOC da Dancold cobre os três níveis de manutenção com cronograma estruturado, frequências definidas por criticidade do ambiente e registro digital de cada intervenção, garantindo rastreabilidade completa para auditorias sanitárias e fiscalizações.
            - listitem [ref=e77]:
              - generic [ref=e78]: "02"
              - generic [ref=e79]:
                - heading "Equipes fixas e volantes com cobertura nacional" [level=3] [ref=e80]
                - paragraph [ref=e81]: Implantamos equipes fixas para clientes de alta criticidade e equipes volantes para operações distribuídas em múltiplas unidades, com atendimento emergencial 24 horas, 7 dias por semana, em todos os estados onde atuamos.
            - listitem [ref=e82]:
              - generic [ref=e83]: "03"
              - generic [ref=e84]:
                - heading "Conformidade regulatória e emissão de ART" [level=3] [ref=e85]
                - paragraph [ref=e86]: Todos os contratos de PMOC incluem a elaboração do plano por engenheiro mecânico habilitado, emissão de ART junto ao CREA, laudos de qualidade do ar e documentação completa para conformidade com ANVISA, Lei 13.589/2018 e normas ABNT aplicáveis.
