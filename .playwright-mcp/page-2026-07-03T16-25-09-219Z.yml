    - generic [ref=e60]:
      - generic [ref=e61]:
        - paragraph [ref=e63]: Elaboramos e implantamos o Plano de Manutenção, Operação e Controle (PMOC) conforme legislação vigente (Lei 13.589/2018, ANVISA RDC 09/2003 e Portaria MS 3.523/98). Equipes fixas ou volantes, com relatórios técnicos periódicos e laudos de qualidade do ar.
        - generic [ref=e64]:
          - paragraph [ref=e66]: "O PMOC não é um documento, é um sistema de gestão de ativos. A maioria das empresas que operam sem PMOC estruturado descobre isso da pior forma: com uma falha de compressor no meio do dia, uma auditoria da ANVISA que identifica ausência de rastreabilidade nas manutenções, ou um colapso térmico em câmara fria com perda de matéria-prima. A Dancold implanta o PMOC como um processo vivo, integrado à rotina operacional da empresa, não como um arquivo que fica parado em gaveta."
          - paragraph [ref=e68]: O processo começa com o inventário técnico completo de todos os ativos de climatização e refrigeração, levantamento da carga térmica, classificação dos ambientes e definição das frequências de intervenção preditiva, preventiva e corretiva. Um de nossos engenheiros mecânicos define o cronograma e emite a ART. As equipes — fixas para contratos de alta criticidade, volantes para operações distribuídas — executam cada intervenção com registro em plataforma de gestão digital, acessível em desktop e mobile, com histórico técnico completo de cada equipamento. Para indústrias, o resultado é uma redução de até 15% nos custos operacionais com manutenção e extensão da vida útil dos equipamentos. A eliminação do risco de multas da ANVISA de até R$1,5 milhões por falta de conformidade. Garantia de continuidade operacional em ambientes onde uma falha técnica coloca vidas em risco.
        - generic [ref=e69]:
          - heading "Características" [level=2] [ref=e70]
          - list [ref=e71]:
            - listitem [ref=e72]:
              - generic [ref=e73]: "01"
