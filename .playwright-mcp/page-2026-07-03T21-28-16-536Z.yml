    - generic [ref=e45]:
      - generic [ref=e46]:
        - paragraph [ref=e48]: Executamos a instalação de sistemas de ar-condicionado (Split, VRF/VRV, Chiller, Fan Coil), refrigeração industrial (câmaras frias, túneis de congelamento, resfriadores de água) e sistemas de ventilação e pressurização.
        - generic [ref=e49]:
          - paragraph [ref=e51]: A qualidade de uma instalação define o comportamento do sistema pela próxima década de operação. Uma tubulação mal dimensionada gera perda de carga e consumo excessivo de energia. Um equipamento instalado fora das especificações do fabricante tem a garantia comprometida e falha antes do prazo. A Dancold executa instalações e é certificada pelas melhores marcas de ar-condicionado do mundo, seguindo rigorosamente os procedimentos de cada fabricante.
          - paragraph [ref=e53]: "Para o setor industrial, instalamos sistemas completos de refrigeração de processo: chillers de água gelada com periféricos, torres de resfriamento, câmaras frias, túneis de congelamento e balcões frigoríficos. Para hospitais e laboratórios, executamos instalações de sistemas VRF com controle de pressurização diferencial, AHUs e UTA's com filtragem de alta eficiência e monitoramento de temperatura em ambientes críticos. Para edificações corporativas e shopping centers, trabalhamos com sistemas centralizados de grande porte com gestão integrada de energia. Em todos os casos, a instalação termina com comissionamento completo, testes de desempenho e emissão de relatório técnico de entrega."
